<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
    .title { font-size: 20px; font-weight: bold; fill: #e2e8f0; }
    .section-title { font-size: 14px; font-weight: bold; fill: #94a3b8; letter-spacing: 0.05em; }
    .node-name { font-size: 13px; fill: #e2e8f0; font-weight: bold; }
    .node-desc { font-size: 10px; fill: #94a3b8; }
    .sig-name { font-size: 10px; fill: #94a3b8; }
    .sig-connected { font-size: 10px; fill: #10b981; }
    .sig-unconnected { font-size: 10px; fill: #475569; }
    .legend-text { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrow-gold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#eab308"/>
    </marker>
    <!-- Glow filters -->
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="820" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text x="640" y="30" text-anchor="middle" class="title">FIFOCard — EventBus 信号通信架构图</text>
  <line x1="300" y1="40" x2="980" y2="40" stroke="#334155" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- LAYER LABELS -->
  <!-- ============================================================ -->
  <text x="200" y="65" text-anchor="middle" class="section-title" fill="#3b82f6">UI LAYER  界面层</text>
  <text x="640" y="65" text-anchor="middle" class="section-title" fill="#a855f7">EVENTBUS  (Autoload 全局信号总线)</text>
  <text x="1090" y="65" text-anchor="middle" class="section-title" fill="#10b981">LOGIC LAYER  逻辑层</text>

  <!-- Layer divider lines -->
  <line x1="380" y1="75" x2="380" y2="680" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="900" y1="75" x2="900" y2="680" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ============================================================ -->
  <!-- UI LAYER COMPONENTS (x: 40-360) -->
  <!-- ============================================================ -->

  <!-- Card (draggable card UI) -->
  <rect x="50" y="100" width="180" height="65" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="140" y="122" text-anchor="middle" class="node-name">🂠 Card</text>
  <text x="140" y="142" text-anchor="middle" class="node-desc">可拖拽卡牌控件</text>

  <!-- Card OUT signals -->
  <text x="240" y="112" class="sig-connected">emit ▶</text>
  <text x="240" y="126" class="sig-connected">emit ▶</text>
  <text x="240" y="140" class="sig-unconnected">emit ▶</text>

  <!-- HandCardQueue -->
  <rect x="50" y="210" width="210" height="90" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="232" text-anchor="middle" class="node-name">HandCardQueue</text>
  <text x="155" y="250" text-anchor="middle" class="node-desc">手牌队列 (Slots + Gaps)</text>
  <text x="155" y="266" text-anchor="middle" class="node-desc">发牌动画 · 拖放区域 · 插缝检测</text>
  <!-- IN/OUT labels -->
  <text x="55" y="285" class="sig-connected">◀ listen ×4</text>
  <text x="195" y="285" text-anchor="end" class="sig-connected">emit ×2 ▶</text>

  <!-- ActiveCardSlot -->
  <rect x="50" y="345" width="190" height="65" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="145" y="367" text-anchor="middle" class="node-name">ActiveCardSlot</text>
  <text x="145" y="387" text-anchor="middle" class="node-desc">活跃卡牌槽 (Drag Ghost)</text>
  <!-- IN labels -->
  <text x="55" y="402" class="sig-connected">◀ listen ×4</text>

  <!-- ============================================================ -->
  <!-- SIGNAL FLOW ARROWS (UI ↔ EventBus ↔ Logic) -->
  <!-- ============================================================ -->

  <!-- Card → drag_started → HandCardQueue + ActiveCardSlot -->
  <path d="M 230,115 L 270,115 L 270,250 L 262,250" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="275" y="180" class="sig-name" fill="#f97316">card_drag_started</text>

  <path d="M 270,250 L 280,250 L 280,370 L 242,370" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>

  <!-- Card → card_droped → HandCardQueue + ActiveCardSlot (UI↔UI) -->
  <path d="M 230,130 L 310,130 L 310,235 L 262,235" stroke="#eab308" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-gold)"/>
  <text x="315" y="180" class="sig-name" fill="#eab308">card_droped</text>

  <path d="M 310,235 L 320,235 L 320,380 L 242,380" stroke="#eab308" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-gold)"/>

  <!-- Card → card_selected (unconnected) -->
  <path d="M 230,145 L 310,145 L 310,400 L 300,400" stroke="#475569" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
  <text x="315" y="260" class="sig-unconnected">card_selected (未连接)</text>

  <!-- ============================================================ -->
  <!-- EVENTBUS CENTER PANEL -->
  <!-- ============================================================ -->
  <rect x="400" y="90" width="480" height="560" rx="8" fill="#0d1117" fill-opacity="0.6" stroke="#7c3aed" stroke-width="2" filter="url(#glow-purple)"/>

  <text x="640" y="115" text-anchor="middle" class="node-name" font-size="15" fill="#a855f7">⚡ EventBus (全局信号总线)</text>
  <line x1="420" y1="125" x2="860" y2="125" stroke="#334155" stroke-width="0.5"/>

  <!-- Signal Group 1: UI → Logic -->
  <rect x="415" y="140" width="220" height="210" rx="4" fill="#1e1b4b" fill-opacity="0.5" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="425" y="158" class="node-name" font-size="12" fill="#a855f7">UI → Logic  (9)</text>
  <line x1="425" y1="164" x2="625" y2="164" stroke="#334155" stroke-width="0.3"/>

  <text x="425" y="182" class="sig-connected">● card_drag_started(card)</text>
  <text x="425" y="198" class="sig-connected">● card_droped(card, pos)</text>
  <text x="425" y="214" class="sig-connected">● active_card_inserted(event)</text>
  <text x="425" y="230" class="sig-connected">● update_hand_queue_ui(event)</text>
  <text x="425" y="246" class="sig-unconnected">○ card_slot_clicked(idx)</text>
  <text x="425" y="262" class="sig-unconnected">○ active_card_played()</text>
  <text x="425" y="278" class="sig-unconnected">○ card_selected(card)</text>
  <text x="425" y="294" class="sig-unconnected">○ item_used(slot, target)</text>
  <text x="425" y="310" class="sig-unconnected">○ shop_item_purchased(id)</text>
  <text x="425" y="326" class="sig-unconnected">○ next_level_requested()</text>
  <text x="425" y="342" class="sig-unconnected">○ restart_requested()</text>

  <!-- Signal Group 2: Logic → UI -->
  <rect x="645" y="140" width="220" height="170" rx="4" fill="#052e16" fill-opacity="0.5" stroke="#059669" stroke-width="0.5"/>
  <text x="655" y="158" class="node-name" font-size="12" fill="#10b981">Logic → UI  (5)</text>
  <line x1="655" y1="164" x2="855" y2="164" stroke="#334155" stroke-width="0.3"/>

  <text x="655" y="182" class="sig-connected">● level_started(hand_size)</text>
  <text x="655" y="198" class="sig-connected">● card_drawned(event)</text>
  <text x="655" y="214" class="sig-connected">● active_card_changed(event)</text>
  <text x="655" y="230" class="sig-connected">● get_playing_card(event)</text>
  <text x="655" y="246" class="sig-connected">● active_card_inserted(event)</text>
  <text x="655" y="266" class="node-desc" fill="#475569">  ← 也归在此组 (由UI触发，逻辑消费)</text>

  <!-- Signal Group 3: Logic Internal -->
  <rect x="415" y="360" width="220" height="100" rx="4" fill="#1e3a5f" fill-opacity="0.5" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="425" y="378" class="node-name" font-size="12" fill="#3b82f6">Logic Internal  (3)</text>
  <line x1="425" y1="384" x2="625" y2="384" stroke="#334155" stroke-width="0.3"/>

  <text x="425" y="402" class="sig-connected">● deal_animation_finished()</text>
  <text x="425" y="418" class="sig-unconnected">○ poker_deck_shuffled()</text>
  <text x="425" y="434" class="sig-unconnected">○ poker_deck_is_empty()</text>

  <!-- Signal Group 4: UI ↔ UI -->
  <rect x="645" y="360" width="220" height="80" rx="4" fill="#1c1917" fill-opacity="0.5" stroke="#ea580c" stroke-width="0.5"/>
  <text x="655" y="378" class="node-name" font-size="12" fill="#f97316">UI ↔ UI  (1)</text>
  <line x1="655" y1="384" x2="855" y2="384" stroke="#334155" stroke-width="0.3"/>
  <text x="655" y="402" class="sig-connected">● card_droped(card, pos)</text>
  <text x="655" y="422" class="node-desc" fill="#475569">Card → HandCardQ / ActiveCardSlot</text>

  <!-- Key signal details in EventBus bottom area -->
  <rect x="415" y="475" width="450" height="85" rx="4" fill="#0f172a" fill-opacity="0.5" stroke="#334155" stroke-width="0.5"/>
  <text x="425" y="495" class="node-name" font-size="11" fill="#e2e8f0">CardEvent (RefCounted 事件载荷)</text>
  <line x1="425" y1="502" x2="855" y2="502" stroke="#334155" stroke-width="0.3"/>
  <text x="425" y="520" class="node-desc">字段: cards: Array[CardData]  —  牌数据数组</text>
  <text x="425" y="536" class="node-desc">      target_index_in_handcards: int  —  插入位置索引</text>
  <text x="425" y="552" class="node-desc">      start_index_in_handcards: int  —  匹配起始位置</text>

  <!-- ============================================================ -->
  <!-- LOGIC LAYER COMPONENTS (x: 920-1240) -->
  <!-- ============================================================ -->

  <!-- CardManager -->
  <rect x="930" y="100" width="170" height="60" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1015" y="122" text-anchor="middle" class="node-name">CardManager</text>
  <text x="1015" y="142" text-anchor="middle" class="node-desc">牌库: 52张 Fisher-Yates 洗牌</text>
  <text x="935" y="154" class="sig-unconnected">emit poker_deck_shuffled()</text>

  <!-- GameManager -->
  <rect x="930" y="200" width="190" height="100" rx="6" fill="#052e16" stroke="#10b981" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="1025" y="222" text-anchor="middle" class="node-name">GameManager</text>
  <text x="1025" y="240" text-anchor="middle" class="node-desc">中央游戏状态 (模型层)</text>
  <text x="1025" y="256" text-anchor="middle" class="node-desc">hand_cards · active_card · score</text>
  <text x="935" y="278" class="sig-connected">emit ▶ level_started</text>
  <text x="935" y="293" class="sig-connected">emit ▶ card_drawned / active_card_changed / update_hand_queue_ui</text>

  <!-- StateMachine -->
  <rect x="930" y="340" width="250" height="310" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="1055" y="362" text-anchor="middle" class="node-name">StateMachine (控制器层)</text>
  <text x="1055" y="378" text-anchor="middle" class="node-desc">go_to()  ·  collect children  ·  process(true) 仅当前状态</text>

  <!-- State flow inside StateMachine -->
  <!-- SETUP -->
  <rect x="945" y="395" width="100" height="50" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="995" y="415" text-anchor="middle" class="node-name">SETUP</text>
  <text x="995" y="434" text-anchor="middle" class="node-desc">发牌 + 动画</text>

  <path d="M 1045,420 L 1055,420" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- IDLE -->
  <rect x="1060" y="395" width="100" height="50" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="1110" y="415" text-anchor="middle" class="node-name">IDLE</text>
  <text x="1110" y="434" text-anchor="middle" class="node-desc">等待输入</text>

  <path d="M 1110,445 L 1110,460" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- MATCHING -->
  <rect x="1060" y="465" width="100" height="50" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="1110" y="485" text-anchor="middle" class="node-name">MATCHING</text>
  <text x="1110" y="504" text-anchor="middle" class="node-desc">花色检测</text>

  <path d="M 1110,515 L 1110,530" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>

  <!-- PLAYING -->
  <rect x="1060" y="535" width="100" height="50" rx="4" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5"/>
  <text x="1110" y="555" text-anchor="middle" class="node-name">PLAYING ⚠</text>
  <text x="1110" y="574" text-anchor="middle" class="node-desc">出牌 (死锁!)</text>

  <!-- Deadlock warning -->
  <text x="955" y="595" class="node-desc" fill="#ef4444">⚠ MATCHING 匹配失败时没有过渡状态</text>
  <text x="955" y="612" class="node-desc" fill="#ef4444">⚠ PLAYING 不调用 go_to() → 永远卡在 PLAYING</text>
  <text x="955" y="632" class="node-desc" fill="#ef4444">⚠ StateMachine 死锁: 无法回到 IDLE</text>

  <!-- Signal connections: GameManager → EventBus → UI -->
  <!-- level_started, card_drawned, active_card_changed -->
  <path d="M 930,260 L 900,260 L 880,260" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="900" y="250" class="sig-name" fill="#10b981" font-size="9">level_started</text>
  <text x="900" y="275" class="sig-name" fill="#10b981" font-size="9">card_drawned</text>

  <!-- active_card_changed to ActiveCardSlot -->
  <path d="M 880,245 L 860,245 L 860,370 L 242,370" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>

  <!-- update_hand_queue_ui to HandCardQueue -->
  <path d="M 880,280 L 860,280 L 860,255 L 262,255" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-green)"/>
  <text x="860" y="295" class="sig-name" fill="#10b981" font-size="9">update_hand_queue_ui</text>

  <!-- active_card_inserted: HandCardQueue → IdleState -->
  <path d="M 260,280 L 880,280 L 880,395 L 920,395 L 920,400 L 1045,400" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="570" y="390" text-anchor="middle" class="sig-name" fill="#a855f7">active_card_inserted(event)  →  IdleState 消费</text>

  <!-- get_playing_card: PlayingCardState → HandCardQueue -->
  <path d="M 1110,585 L 1110,650 L 280,650 L 280,300 L 262,300" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="600" y="665" text-anchor="middle" class="sig-name" fill="#dc2626">get_playing_card(event)  ← PlayingCardState emit (唯一出口信号)</text>

  <!-- deal_animation_finished: HandCardQueue → SetupState -->
  <path d="M 260,290 L 900,290 L 900,410 L 900,415 L 1045,415" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="570" y="305" text-anchor="middle" class="sig-name" fill="#3b82f6">deal_animation_finished  →  SetupState await</text>

  <!-- CardManager shuffles deck -->
  <path d="M 930,130 L 910,130 L 910,175" stroke="#475569" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
  <text x="915" y="160" class="sig-unconnected" font-size="8">poker_deck_shuffled (未消费)</text>

  <!-- SETUP calls GameManager.start_level() -->
  <path d="M 945,420 L 935,420 L 935,250 L 930,250" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="910" y="340" class="node-desc" fill="#3b82f6" font-size="8">start_level()</text>

  <!-- IDLE calls GameManager.insert_active_card() -->
  <path d="M 1060,415 L 935,415 L 935,265 L 930,265" stroke="#a855f7" stroke-width="1" stroke-dasharray="2,2" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="910" y="340" class="node-desc" fill="#a855f7" font-size="8">insert_active_card()</text>

  <!-- MATCHING calls GameManager._get_suit_segment() -->
  <path d="M 1060,485 L 935,485 L 935,275 L 930,275" stroke="#a855f7" stroke-width="1" stroke-dasharray="2,2" fill="none" marker-end="url(#arrow-purple)"/>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="40" y="700" width="1200" height="110" rx="6" fill="#0f172a" fill-opacity="0.7" stroke="#334155" stroke-width="1"/>

  <text x="55" y="722" class="legend-text" font-weight="bold" fill="#e2e8f0">图例</text>

  <!-- Arrow styles -->
  <line x1="55" y1="742" x2="110" y2="742" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="118" y="746" class="legend-text" fill="#10b981">实线 = 已连接信号</text>

  <line x1="250" y1="742" x2="305" y2="742" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="313" y="746" class="legend-text" fill="#475569">虚线 = 未连接 / 预留信号</text>

  <line x1="470" y1="742" x2="525" y2="742" stroke="#eab308" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-gold)"/>
  <text x="533" y="746" class="legend-text" fill="#eab308">点虚线 = UI↔UI 信号</text>

  <!-- Color groups -->
  <rect x="55" y="758" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="72" y="769" class="legend-text">Logic→UI (绿)</text>

  <rect x="160" y="758" width="12" height="12" rx="2" fill="#a855f7"/>
  <text x="177" y="769" class="legend-text">UI→Logic (紫)</text>

  <rect x="265" y="758" width="12" height="12" rx="2" fill="#f97316"/>
  <text x="282" y="769" class="legend-text">Card Drag (橙)</text>

  <rect x="385" y="758" width="12" height="12" rx="2" fill="#dc2626"/>
  <text x="402" y="769" class="legend-text">Deadlock (红)</text>

  <rect x="500" y="758" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="517" y="769" class="legend-text">State Flow (蓝)</text>

  <!-- Key stats -->
  <text x="670" y="746" class="legend-text" fill="#94a3b8">声明信号: 19 个</text>
  <text x="670" y="762" class="legend-text" fill="#10b981">已连接: 8 个</text>
  <text x="670" y="778" class="legend-text" fill="#475569">未连接: 11 个</text>

  <text x="830" y="746" class="legend-text" fill="#94a3b8">状态机: 4 / 8 已实现</text>
  <text x="830" y="762" class="legend-text" fill="#dc2626">已知 Bug: 3 个 (Draw Loop / Disconnect / Deadlock)</text>
  <text x="830" y="778" class="legend-text" fill="#475569">缺少: FILLING / LevelEnd / GameOver / PopActiveCard</text>

  <text x="1090" y="746" text-anchor="end" class="node-desc" fill="#475569">FIFOCard Godot 4.4  |  2026-06-02</text>
</svg>
